<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Flowmart Factory Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: 'Prompt', system-ui, -apple-system, sans-serif;
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(20,184,166,.18), transparent 60%),
      radial-gradient(900px 600px at 110% 0%, rgba(99,102,241,.22), transparent 55%),
      linear-gradient(180deg,#020617 0%, #0b1220 100%);
    color: #e2e8f0; min-height: 100vh;
  }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 22px 18px 60px; }
  header { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 22px; }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand .logo { width: 44px; height: 44px; border-radius: 14px; display: grid; place-items: center; font-size: 22px;
    background: linear-gradient(135deg,#14b8a6,#0ea5e9); box-shadow: 0 12px 30px -10px rgba(20,184,166,.6); }
  .brand h1 { margin: 0; font-size: 20px; font-weight: 800; letter-spacing: -.3px; }
  .brand p  { margin: 0; font-size: 12px; color: #94a3b8; }
  .top-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn { background: rgba(255,255,255,.08); color: #e2e8f0; border: 1px solid rgba(255,255,255,.14);
    padding: 9px 14px; border-radius: 12px; font: inherit; font-size: 13px; font-weight: 700; cursor: pointer;
    transition: transform .15s, background .2s; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
  .btn:hover { background: rgba(255,255,255,.14); transform: translateY(-1px); }
  .btn.primary { background: linear-gradient(135deg,#14b8a6,#0ea5e9); border-color: transparent; color: #fff; }

  /* Stat tiles */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 22px; }
  .tile { position: relative; overflow: hidden; padding: 18px; border-radius: 18px;
    background: linear-gradient(160deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
    border: 1px solid rgba(255,255,255,.1); backdrop-filter: blur(8px); }
  .tile .lbl { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: .6px; font-weight: 700; }
  .tile .val { font-size: 28px; font-weight: 900; margin-top: 4px; letter-spacing: -.5px; }
  .tile .sub { font-size: 12px; color: #cbd5e1; margin-top: 2px; }
  .tile .ic  { position: absolute; right: 14px; top: 14px; font-size: 22px; opacity: .7; }
  .tile.t-green .val { color: #5eead4; }
  .tile.t-blue  .val { color: #93c5fd; }
  .tile.t-pink  .val { color: #f9a8d4; }
  .tile.t-amber .val { color: #fcd34d; }

  /* Grid layouts */
  .grid-2 { display: grid; grid-template-columns: 1fr; gap: 18px; margin-bottom: 18px; }
  @media (min-width: 980px) { .grid-2 { grid-template-columns: 1.4fr 1fr; } }
  .grid-3 { display: grid; grid-template-columns: 1fr; gap: 18px; }
  @media (min-width: 980px) { .grid-3 { grid-template-columns: 1fr 1fr 1fr; } }

  .card {
    background: linear-gradient(160deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
    border: 1px solid rgba(255,255,255,.1); border-radius: 18px; padding: 18px;
  }
  .card h3 { margin: 0 0 4px; font-size: 14px; font-weight: 800; }
  .card .desc { font-size: 12px; color: #94a3b8; margin-bottom: 14px; }
  canvas { max-width: 100%; }

  /* Province table */
  .prov-list { display: grid; gap: 8px; max-height: 380px; overflow-y: auto; padding-right: 4px; }
  .prov-row { display: grid; grid-template-columns: 28px 1fr auto; align-items: center; gap: 10px;
    background: rgba(255,255,255,.04); padding: 10px 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,.06); }
  .prov-row .rank { width: 26px; height: 26px; border-radius: 8px; display: grid; place-items: center;
    background: rgba(20,184,166,.15); color: #5eead4; font-size: 12px; font-weight: 800; }
  .prov-row.top1 .rank { background: linear-gradient(135deg,#facc15,#f97316); color: #1f2937; }
  .prov-row.top2 .rank { background: linear-gradient(135deg,#cbd5e1,#94a3b8); color: #0f172a; }
  .prov-row.top3 .rank { background: linear-gradient(135deg,#d97706,#92400e); color: #fff; }
  .prov-row .nm { font-weight: 700; font-size: 13.5px; }
  .prov-row .sb { font-size: 11px; color: #94a3b8; }
  .prov-row .amt { font-weight: 800; color: #5eead4; font-size: 13.5px; }
  .prov-row .bar { grid-column: 1/-1; height: 4px; background: rgba(255,255,255,.06); border-radius: 999px; overflow: hidden; margin-top: 2px;}
  .prov-row .bar > i { display:block; height:100%; background: linear-gradient(90deg,#14b8a6,#0ea5e9); }

  /* Customers / orders */
  .ord-row { display: grid; grid-template-columns: 1fr auto; gap: 4px 12px;
    background: rgba(255,255,255,.04); padding: 10px 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,.06); margin-bottom: 8px; }
  .ord-row .nm { font-weight: 700; font-size: 13px; }
  .ord-row .meta { font-size: 11px; color: #94a3b8; }
  .ord-row .amt { font-weight: 800; color: #93c5fd; font-size: 13px; align-self: center; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 800;
    background: rgba(94,234,212,.15); color: #5eead4; }
  .pill.closed { background: rgba(148,163,184,.18); color: #cbd5e1; }

  .empty { text-align: center; padding: 30px 10px; color: #94a3b8; font-size: 13px; }
  .loading { text-align:center; padding: 40px; color: #94a3b8;}

  footer { margin-top: 36px; text-align: center; font-size: 11px; color: #64748b; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo">🏭</div>
      <div>
        <h1>Factory Dashboard</h1>
        <p>ภาพรวมยอดขายและออเดอร์ของโรงงาน Flowmart</p>
      </div>
    </div>
    <div class="top-actions">
      <button class="btn" onclick="loadData()">🔄 รีเฟรช</button>
      <a class="btn primary" href="/flowmart.html">← กลับหน้าร้าน</a>
    </div>
  </header>

  <div id="root">
    <div class="loading">⏳ กำลังโหลดข้อมูล...</div>
  </div>

  <footer>© Flowmart Factory · อัปเดตล่าสุด: <span id="updated">—</span></footer>
</div>

<script>
const THAI_BAHT = new Intl.NumberFormat('th-TH');

async function loadData() {
  const root = document.getElementById('root');
  root.innerHTML = '<div class="loading">⏳ กำลังโหลดข้อมูล...</div>';
  try {
    const res = await fetch('/api/flowmart-orders');
    const json = await res.json();
    const orders = json.orders || [];
    render(orders);
    document.getElementById('updated').textContent = new Date().toLocaleString('th-TH');
  } catch (e) {
    root.innerHTML = '<div class="empty">โหลดข้อมูลไม่สำเร็จ: ' + (e.message || e) + '</div>';
  }
}

function render(orders) {
  // Stats
  const totalRev = orders.reduce((s,o)=> s + (o.totalAmount||0), 0);
  const totalOrders = orders.length;
  const closed = orders.filter(o => o.status === 'closed').length;
  const pending = totalOrders - closed;
  const customers = new Set(orders.map(o => o.customerEmail || o.customerName)).size;

  // Province aggregation
  const byProv = {};
  for (const o of orders) {
    const p = (o.address && o.address.province) || 'ไม่ระบุ';
    if (!byProv[p]) byProv[p] = { count: 0, total: 0 };
    byProv[p].count += 1;
    byProv[p].total += (o.totalAmount||0);
  }
  const provList = Object.entries(byProv).map(([nm, v]) => ({ nm, ...v }))
    .sort((a,b)=> b.total - a.total);
  const maxProvTotal = provList[0]?.total || 1;

  // Products aggregation
  const byProduct = {};
  for (const o of orders) {
    for (const it of (o.items||[])) {
      const k = it.name || it.id || 'unknown';
      if (!byProduct[k]) byProduct[k] = { qty: 0, total: 0 };
      byProduct[k].qty += Number(it.qty||0);
      byProduct[k].total += Number(it.total||0);
    }
  }
  const productList = Object.entries(byProduct).map(([nm, v]) => ({ nm, ...v }))
    .sort((a,b)=> b.total - a.total).slice(0, 8);

  // Category
  const byCat = {};
  for (const o of orders) {
    const c = o.category || 'อื่นๆ';
    byCat[c] = (byCat[c]||0) + (o.totalAmount||0);
  }
  const catList = Object.entries(byCat).sort((a,b)=> b[1]-a[1]);

  // Daily revenue (last 30 days)
  const dayMap = {};
  for (const o of orders) {
    const d = new Date(o.ts || Date.now());
    const key = d.toISOString().slice(0,10);
    dayMap[key] = (dayMap[key]||0) + (o.totalAmount||0);
  }
  const sortedDays = Object.keys(dayMap).sort().slice(-30);
  const dayLabels = sortedDays.map(d => d.slice(5));
  const dayValues = sortedDays.map(d => dayMap[d]);

  // New customers per day (last 14)
  const seen = {};
  const newPerDay = {};
  const sortedOrders = [...orders].sort((a,b)=> (a.ts||0)-(b.ts||0));
  for (const o of sortedOrders) {
    const k = o.customerEmail || o.customerName;
    if (!seen[k]) {
      seen[k] = true;
      const d = new Date(o.ts||Date.now()).toISOString().slice(0,10);
      newPerDay[d] = (newPerDay[d]||0)+1;
    }
  }
  const newDays = Object.keys(newPerDay).sort().slice(-14);

  // Recent orders
  const recent = [...orders].sort((a,b)=> (b.ts||0)-(a.ts||0)).slice(0, 8);

  document.getElementById('root').innerHTML = `
    <section class="stats">
      <div class="tile t-green"><div class="ic">💰</div><div class="lbl">ยอดขายรวม</div><div class="val">฿${THAI_BAHT.format(totalRev)}</div><div class="sub">${totalOrders} ออเดอร์</div></div>
      <div class="tile t-blue"><div class="ic">📦</div><div class="lbl">ออเดอร์ที่ปิดดีลแล้ว</div><div class="val">${closed}</div><div class="sub">รอปิดดีล ${pending}</div></div>
      <div class="tile t-pink"><div class="ic">👥</div><div class="lbl">ลูกค้าทั้งหมด</div><div class="val">${customers}</div><div class="sub">unique customers</div></div>
      <div class="tile t-amber"><div class="ic">🏙️</div><div class="lbl">จังหวัดที่ครอบคลุม</div><div class="val">${provList.length}</div><div class="sub">${provList[0]?.nm || '-'} ขายดีสุด</div></div>
    </section>

    <section class="grid-2">
      <div class="card">
        <h3>📈 ยอดขายรายวัน (30 วันล่าสุด)</h3>
        <div class="desc">รวมมูลค่าออเดอร์ต่อวัน (บาท)</div>
        <canvas id="chDaily" height="120"></canvas>
      </div>
      <div class="card">
        <h3>🏆 จังหวัดขายดีที่สุด</h3>
        <div class="desc">เรียงตามมูลค่ายอดขาย</div>
        <div class="prov-list">
          ${provList.length === 0 ? '<div class="empty">ยังไม่มีข้อมูล</div>' :
            provList.map((p,i)=> `
            <div class="prov-row ${i===0?'top1':i===1?'top2':i===2?'top3':''}">
              <div class="rank">${i+1}</div>
              <div><div class="nm">${escapeHtml(p.nm)}</div><div class="sb">${p.count} ออเดอร์</div></div>
              <div class="amt">฿${THAI_BAHT.format(p.total)}</div>
              <div class="bar"><i style="width:${Math.round(p.total/maxProvTotal*100)}%"></i></div>
            </div>`).join('')}
        </div>
      </div>
    </section>

    <section class="grid-3">
      <div class="card">
        <h3>🥇 สินค้าขายดี Top 8</h3>
        <div class="desc">เรียงตามมูลค่ายอดขาย</div>
        <canvas id="chProducts" height="180"></canvas>
      </div>
      <div class="card">
        <h3>📂 ยอดขายตามหมวดหมู่</h3>
        <div class="desc">สัดส่วนรายได้ของแต่ละหมวด</div>
        <canvas id="chCats" height="180"></canvas>
      </div>
      <div class="card">
        <h3>👋 ลูกค้าใหม่ (14 วัน)</h3>
        <div class="desc">จำนวนลูกค้าใหม่ต่อวัน</div>
        <canvas id="chNew" height="180"></canvas>
      </div>
    </section>

    <section class="card" style="margin-top:18px;">
      <h3>🕐 ออเดอร์ล่าสุด</h3>
      <div class="desc">8 รายการล่าสุด</div>
      ${recent.length === 0 ? '<div class="empty">ยังไม่มีออเดอร์</div>' :
        recent.map(o => `
        <div class="ord-row">
          <div>
            <div class="nm">${escapeHtml(o.customerName || '-')} <span class="pill ${o.status==='closed'?'closed':''}">${o.status==='closed'?'ปิดดีลแล้ว':'รอปิดดีล'}</span></div>
            <div class="meta">${escapeHtml(o.address?.province||'-')} · ${(o.items||[]).length} รายการ · ${new Date(o.ts).toLocaleString('th-TH')}</div>
          </div>
          <div class="amt">฿${THAI_BAHT.format(o.totalAmount||0)}</div>
        </div>`).join('')}
    </section>
  `;

  // Charts
  const textColor = '#cbd5e1', gridColor = 'rgba(255,255,255,.08)';
  Chart.defaults.color = textColor;
  Chart.defaults.font.family = "'Prompt', sans-serif";

  new Chart(document.getElementById('chDaily'), {
    type: 'line',
    data: { labels: dayLabels, datasets: [{
      label: 'ยอดขาย (บาท)',
      data: dayValues,
      borderColor: '#14b8a6', backgroundColor: 'rgba(20,184,166,.18)',
      borderWidth: 2, fill: true, tension: .35, pointRadius: 3, pointBackgroundColor:'#5eead4'
    }] },
    options: { responsive: true, plugins: { legend: { display: false } },
      scales: { x: { grid: { color: gridColor } }, y: { grid: { color: gridColor }, beginAtZero: true } } }
  });

  new Chart(document.getElementById('chProducts'), {
    type: 'bar',
    data: { labels: productList.map(p=>p.nm),
      datasets: [{ label:'฿', data: productList.map(p=>p.total),
        backgroundColor: 'rgba(14,165,233,.7)', borderRadius: 6, borderColor:'#0ea5e9', borderWidth:1 }]},
    options: { indexAxis: 'y', plugins: { legend: { display: false } },
      scales: { x: { grid: { color: gridColor }, beginAtZero: true }, y: { grid: { display:false } } } }
  });

  new Chart(document.getElementById('chCats'), {
    type: 'doughnut',
    data: { labels: catList.map(c=>c[0]),
      datasets: [{ data: catList.map(c=>c[1]),
        backgroundColor: ['#14b8a6','#0ea5e9','#a78bfa','#f472b6','#fbbf24','#34d399','#fb7185'],
        borderColor: '#0b1220', borderWidth: 2 }] },
    options: { plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, padding: 8 } } } }
  });

  new Chart(document.getElementById('chNew'), {
    type: 'bar',
    data: { labels: newDays.map(d=>d.slice(5)),
      datasets: [{ label:'ลูกค้าใหม่', data: newDays.map(d=>newPerDay[d]),
        backgroundColor: 'rgba(244,114,182,.7)', borderRadius: 6 }] },
    options: { plugins: { legend: { display: false } },
      scales: { x: { grid: { display: false } }, y: { grid: { color: gridColor }, beginAtZero: true, ticks: { precision: 0 } } } }
  });
}

function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

loadData();
</script>
</body>
</html>
