<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Flowmart Factory Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; }
  :root {
    --bg-1: #f5f8ff;
    --bg-2: #eef2ff;
    --ink: #0f172a;
    --ink-soft: #475569;
    --muted: #64748b;
    --line: rgba(15, 23, 42, .08);
    --card: rgba(255,255,255,.78);
    --card-strong: rgba(255,255,255,.92);
    --brand-a: #14b8a6;
    --brand-b: #0ea5e9;
    --brand-c: #6366f1;
    --brand-d: #ec4899;
    --shadow: 0 20px 50px -24px rgba(30, 64, 175, .25);
  }
  html, body { scroll-behavior: smooth; }
  body {
    margin: 0; font-family: 'Prompt', system-ui, -apple-system, sans-serif;
    color: var(--ink);
    min-height: 100vh;
    background:
      radial-gradient(900px 500px at -10% -20%, rgba(20,184,166,.18), transparent 60%),
      radial-gradient(900px 600px at 110% -10%, rgba(99,102,241,.20), transparent 55%),
      radial-gradient(900px 600px at 50% 120%, rgba(236,72,153,.14), transparent 55%),
      linear-gradient(180deg, var(--bg-1), var(--bg-2));
    background-attachment: fixed;
    position: relative; overflow-x: hidden;
  }
  /* floating blobs */
  body::before, body::after {
    content: ""; position: fixed; pointer-events: none; z-index: 0;
    width: 420px; height: 420px; border-radius: 50%; filter: blur(80px); opacity: .55;
    background: radial-gradient(circle, rgba(14,165,233,.55), transparent 70%);
    animation: floatA 18s ease-in-out infinite;
  }
  body::before { top: -120px; left: -120px; }
  body::after {
    top: 40%; right: -160px;
    background: radial-gradient(circle, rgba(236,72,153,.45), transparent 70%);
    animation: floatB 22s ease-in-out infinite;
  }
  @keyframes floatA { 0%,100%{transform:translate(0,0)} 50%{transform:translate(60px,40px)} }
  @keyframes floatB { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-50px,60px)} }
  @keyframes rise { from{opacity:0; transform: translateY(14px)} to{opacity:1; transform: translateY(0)} }
  @keyframes pop  { from{opacity:0; transform: scale(.96)} to{opacity:1; transform: scale(1)} }
  @keyframes shine { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(20,184,166,.45)} 50%{box-shadow:0 0 0 10px rgba(20,184,166,0)} }
  @keyframes barIn { from{width:0} }

  .wrap { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 24px 18px 60px; }
  header { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 22px; animation: rise .5s ease both; }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand .logo {
    width: 48px; height: 48px; border-radius: 16px; display: grid; place-items: center; font-size: 24px; color: #fff;
    background: linear-gradient(135deg, var(--brand-a), var(--brand-b) 50%, var(--brand-c));
    background-size: 200% 200%; animation: shine 6s linear infinite, pulse 2.6s ease-out infinite;
    box-shadow: 0 14px 30px -10px rgba(14,165,233,.55);
  }
  .brand h1 { margin: 0; font-size: 22px; font-weight: 800; letter-spacing: -.4px;
    background: linear-gradient(90deg, #0f172a, #0ea5e9 60%, #6366f1);
    -webkit-background-clip: text; background-clip: text; color: transparent; }
  .brand p  { margin: 2px 0 0; font-size: 12.5px; color: var(--muted); }
  .top-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    background: var(--card-strong); color: var(--ink);
    border: 1px solid var(--line); padding: 10px 16px; border-radius: 14px;
    font: inherit; font-size: 13px; font-weight: 700; cursor: pointer;
    transition: transform .18s ease, box-shadow .2s, background .2s;
    text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
    backdrop-filter: blur(10px);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 24px -14px rgba(15,23,42,.3); }
  .btn.primary {
    background: linear-gradient(135deg, var(--brand-a), var(--brand-b)); color: #fff; border-color: transparent;
    box-shadow: 0 12px 24px -10px rgba(14,165,233,.55);
  }

  /* Stat tiles */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 14px; margin-bottom: 22px; }
  .tile {
    position: relative; overflow: hidden; padding: 18px 18px 16px; border-radius: 20px;
    background: var(--card); border: 1px solid var(--line);
    backdrop-filter: blur(14px); box-shadow: var(--shadow);
    transition: transform .25s ease, box-shadow .25s;
    animation: pop .45s ease both;
  }
  .tile:hover { transform: translateY(-4px); box-shadow: 0 24px 50px -24px rgba(30,64,175,.35); }
  .tile::before {
    content:""; position:absolute; inset:0; border-radius:inherit; padding:1px;
    background: linear-gradient(135deg, rgba(20,184,166,.55), rgba(99,102,241,.45), rgba(236,72,153,.45));
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    opacity: .5; pointer-events: none;
  }
  .tile .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; font-weight: 700; }
  .tile .val { font-size: 30px; font-weight: 900; margin-top: 6px; letter-spacing: -.6px; line-height: 1; }
  .tile .sub { font-size: 12px; color: var(--ink-soft); margin-top: 6px; }
  .tile .ic  { position: absolute; right: 14px; top: 14px; font-size: 24px; opacity: .85;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,.08)); transition: transform .3s; }
  .tile:hover .ic { transform: scale(1.15) rotate(-6deg); }
  .tile.t-green .val { background: linear-gradient(135deg,#0d9488,#14b8a6); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .tile.t-blue  .val { background: linear-gradient(135deg,#0ea5e9,#6366f1); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .tile.t-pink  .val { background: linear-gradient(135deg,#ec4899,#f43f5e); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .tile.t-amber .val { background: linear-gradient(135deg,#f59e0b,#ef4444); -webkit-background-clip:text; background-clip:text; color:transparent; }

  /* Grid layouts */
  .grid-2 { display: grid; grid-template-columns: 1fr; gap: 18px; margin-bottom: 18px; }
  @media (min-width: 980px) { .grid-2 { grid-template-columns: 1.4fr 1fr; } }
  .grid-3 { display: grid; grid-template-columns: 1fr; gap: 18px; }
  @media (min-width: 760px) { .grid-3 { grid-template-columns: 1fr 1fr; } }
  @media (min-width: 1080px) { .grid-3 { grid-template-columns: 1fr 1fr 1fr; } }

  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 20px; padding: 20px;
    backdrop-filter: blur(14px); box-shadow: var(--shadow);
    animation: pop .5s ease both;
    transition: transform .25s ease, box-shadow .25s;
  }
  .card:hover { transform: translateY(-2px); }
  .card h3 { margin: 0 0 4px; font-size: 15px; font-weight: 800; color: var(--ink); display:flex; align-items:center; gap:6px; }
  .card .desc { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
  canvas { max-width: 100%; }

  /* Province table */
  .prov-list { display: grid; gap: 10px; max-height: 400px; overflow-y: auto; padding-right: 4px; }
  .prov-list::-webkit-scrollbar { width: 6px; }
  .prov-list::-webkit-scrollbar-thumb { background: rgba(15,23,42,.15); border-radius: 999px; }
  .prov-row {
    display: grid; grid-template-columns: 30px 1fr auto; align-items: center; gap: 10px;
    background: rgba(255,255,255,.7); padding: 10px 12px; border-radius: 14px;
    border: 1px solid var(--line);
    transition: transform .2s, box-shadow .2s;
    animation: rise .4s ease both;
  }
  .prov-row:hover { transform: translateX(4px); box-shadow: 0 8px 20px -14px rgba(15,23,42,.3); }
  .prov-row .rank { width: 28px; height: 28px; border-radius: 9px; display: grid; place-items: center;
    background: linear-gradient(135deg, rgba(20,184,166,.18), rgba(14,165,233,.18));
    color: #0f766e; font-size: 12px; font-weight: 800; }
  .prov-row.top1 .rank { background: linear-gradient(135deg,#facc15,#f97316); color: #fff; box-shadow: 0 6px 14px -6px rgba(249,115,22,.6); }
  .prov-row.top2 .rank { background: linear-gradient(135deg,#e2e8f0,#94a3b8); color: #0f172a; }
  .prov-row.top3 .rank { background: linear-gradient(135deg,#fb923c,#92400e); color: #fff; }
  .prov-row .nm { font-weight: 700; font-size: 13.5px; color: var(--ink); }
  .prov-row .sb { font-size: 11px; color: var(--muted); }
  .prov-row .amt { font-weight: 800; font-size: 13.5px;
    background: linear-gradient(135deg,#0d9488,#0ea5e9); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .prov-row .bar { grid-column: 1/-1; height: 6px; background: rgba(15,23,42,.06); border-radius: 999px; overflow: hidden; margin-top: 4px;}
  .prov-row .bar > i { display:block; height:100%;
    background: linear-gradient(90deg, var(--brand-a), var(--brand-b), var(--brand-c));
    background-size: 200% 100%; animation: barIn .9s ease both, shine 4s linear infinite; border-radius: 999px; }

  /* Orders */
  .ord-row { display: grid; grid-template-columns: 1fr auto; gap: 4px 12px;
    background: rgba(255,255,255,.7); padding: 12px 14px; border-radius: 14px;
    border: 1px solid var(--line); margin-bottom: 10px;
    transition: transform .2s, box-shadow .2s; animation: rise .4s ease both; }
  .ord-row:hover { transform: translateY(-2px); box-shadow: 0 12px 24px -16px rgba(15,23,42,.3); }
  .ord-row .nm { font-weight: 700; font-size: 13.5px; color: var(--ink); }
  .ord-row .meta { font-size: 11.5px; color: var(--muted); }
  .ord-row .amt { font-weight: 800; font-size: 14px; align-self: center;
    background: linear-gradient(135deg,#0ea5e9,#6366f1); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .pill { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 10.5px; font-weight: 800;
    background: linear-gradient(135deg, rgba(20,184,166,.18), rgba(14,165,233,.18)); color: #0f766e;
    border: 1px solid rgba(20,184,166,.25); margin-left: 4px; }
  .pill.closed { background: rgba(148,163,184,.18); color: #475569; border-color: rgba(148,163,184,.3); }

  .empty { text-align: center; padding: 30px 10px; color: var(--muted); font-size: 13px; }
  .loading { text-align:center; padding: 50px; color: var(--muted); font-size: 14px; }
  .loading::after { content:""; display:inline-block; width:14px; height:14px; border-radius:50%; margin-left:8px;
    border: 2px solid rgba(14,165,233,.3); border-top-color: var(--brand-b); animation: spin 1s linear infinite; vertical-align: -2px; }
  @keyframes spin { to { transform: rotate(360deg) } }

  footer { margin-top: 36px; text-align: center; font-size: 11.5px; color: var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo">🏭</div>
      <div>
        <h1 id="fac-title">Factory Dashboard</h1>
        <p id="fac-subtitle">ภาพรวมยอดขายและออเดอร์ของโรงงาน</p>
      </div>
    </div>
    <div class="top-actions">
      <button class="btn" onclick="loadData()">🔄 รีเฟรช</button>
      <a class="btn primary" href="/flowmart.html">← กลับหน้าร้าน</a>
    </div>
  </header>

  <div id="root">
    <div class="loading">⏳ กำลังโหลดข้อมูล...</div>
  </div>

  <footer>© Flowmart Factory · อัปเดตล่าสุด: <span id="updated">—</span></footer>
</div>

<script>
const THAI_BAHT = new Intl.NumberFormat('th-TH');
const AUTH_SESSION_KEY = 'flowmart_session_v3';
const AUTH_USERS_KEY = 'flowmart_users';

function getSession() {
  const found = document.cookie.split('; ').find(r => r.startsWith(AUTH_SESSION_KEY + '='));
  let raw = found ? decodeURIComponent(found.split('=').slice(1).join('=')) : null;
  if (!raw) raw = localStorage.getItem(AUTH_SESSION_KEY) || sessionStorage.getItem(AUTH_SESSION_KEY);
  if (!raw) return null;
  try { return JSON.parse(raw); } catch { return null; }
}
function getMe() {
  const s = getSession();
  if (!s || s.type !== 'supplier') return null;
  try {
    const users = JSON.parse(localStorage.getItem(AUTH_USERS_KEY) || '{}');
    return { email: s.email, ...(users[s.email] || {}) };
  } catch { return null; }
}
function supplierOwnsOrder(o, me) {
  if (!o || !me) return false;
  if (me.productId) {
    const owns = (o.items || []).some(i => i.id === me.productId);
    if (owns) return true;
    return Boolean(me.category && o.category === me.category && (o.items || []).every(i => !i.id));
  }
  if (me.category) return o.category === me.category;
  return false;
}

const ME = getMe();

async function loadData() {
  const root = document.getElementById('root');
  if (!ME) {
    root.innerHTML = `
      <div class="empty" style="padding:60px 20px;">
        <div style="font-size:48px;margin-bottom:12px;">🔒</div>
        <h2 style="color:#0f172a;margin:0 0 8px;">เฉพาะบัญชีโรงงานเท่านั้น</h2>
        <p style="color:#64748b;margin:0 0 18px;">กรุณาเข้าสู่ระบบด้วยบัญชี "โรงงาน/ผู้ขาย" เพื่อดู Dashboard ของสินค้าคุณ</p>
        <a class="btn primary" href="/flowmart.html">ไปหน้าเข้าสู่ระบบ</a>
      </div>`;
    return;
  }
  document.getElementById('fac-title').textContent = '🏭 ' + (ME.company || ME.name || 'Dashboard โรงงาน');
  document.getElementById('fac-subtitle').textContent = 'สินค้า: ' + (ME.productName || ME.category || '—');
  root.innerHTML = '<div class="loading">⏳ กำลังโหลดข้อมูล...</div>';
  try {
    const res = await fetch('/api/flowmart-orders');
    const json = await res.json();
    const all = json.orders || [];
    const orders = all.filter(o => supplierOwnsOrder(o, ME));
    render(orders);
    document.getElementById('updated').textContent = new Date().toLocaleString('th-TH');
  } catch (e) {
    root.innerHTML = '<div class="empty">โหลดข้อมูลไม่สำเร็จ: ' + (e.message || e) + '</div>';
  }
}


function render(orders) {
  // Stats
  const totalRev = orders.reduce((s,o)=> s + (o.totalAmount||0), 0);
  const totalOrders = orders.length;
  const closed = orders.filter(o => o.status === 'closed').length;
  const pending = totalOrders - closed;
  const customers = new Set(orders.map(o => o.customerEmail || o.customerName)).size;

  // Province aggregation
  const byProv = {};
  for (const o of orders) {
    const p = (o.address && o.address.province) || 'ไม่ระบุ';
    if (!byProv[p]) byProv[p] = { count: 0, total: 0 };
    byProv[p].count += 1;
    byProv[p].total += (o.totalAmount||0);
  }
  const provList = Object.entries(byProv).map(([nm, v]) => ({ nm, ...v }))
    .sort((a,b)=> b.total - a.total);
  const maxProvTotal = provList[0]?.total || 1;

  // Products aggregation
  const byProduct = {};
  for (const o of orders) {
    for (const it of (o.items||[])) {
      const k = it.name || it.id || 'unknown';
      if (!byProduct[k]) byProduct[k] = { qty: 0, total: 0 };
      byProduct[k].qty += Number(it.qty||0);
      byProduct[k].total += Number(it.total||0);
    }
  }
  const productList = Object.entries(byProduct).map(([nm, v]) => ({ nm, ...v }))
    .sort((a,b)=> b.total - a.total).slice(0, 8);

  // Category
  const byCat = {};
  for (const o of orders) {
    const c = o.category || 'อื่นๆ';
    byCat[c] = (byCat[c]||0) + (o.totalAmount||0);
  }
  const catList = Object.entries(byCat).sort((a,b)=> b[1]-a[1]);

  // Daily revenue (last 30 days)
  const dayMap = {};
  for (const o of orders) {
    const d = new Date(o.ts || Date.now());
    const key = d.toISOString().slice(0,10);
    dayMap[key] = (dayMap[key]||0) + (o.totalAmount||0);
  }
  const sortedDays = Object.keys(dayMap).sort().slice(-30);
  const dayLabels = sortedDays.map(d => d.slice(5));
  const dayValues = sortedDays.map(d => dayMap[d]);

  // New customers per day (last 14)
  const seen = {};
  const newPerDay = {};
  const sortedOrders = [...orders].sort((a,b)=> (a.ts||0)-(b.ts||0));
  for (const o of sortedOrders) {
    const k = o.customerEmail || o.customerName;
    if (!seen[k]) {
      seen[k] = true;
      const d = new Date(o.ts||Date.now()).toISOString().slice(0,10);
      newPerDay[d] = (newPerDay[d]||0)+1;
    }
  }
  const newDays = Object.keys(newPerDay).sort().slice(-14);

  // Recent orders
  const recent = [...orders].sort((a,b)=> (b.ts||0)-(a.ts||0)).slice(0, 8);

  document.getElementById('root').innerHTML = `
    <section class="stats">
      <div class="tile t-green"><div class="ic">💰</div><div class="lbl">ยอดขายรวม</div><div class="val">฿${THAI_BAHT.format(totalRev)}</div><div class="sub">${totalOrders} ออเดอร์</div></div>
      <div class="tile t-blue"><div class="ic">📦</div><div class="lbl">ออเดอร์ที่ปิดดีลแล้ว</div><div class="val">${closed}</div><div class="sub">รอปิดดีล ${pending}</div></div>
      <div class="tile t-pink"><div class="ic">👥</div><div class="lbl">ลูกค้าทั้งหมด</div><div class="val">${customers}</div><div class="sub">unique customers</div></div>
      <div class="tile t-amber"><div class="ic">🏙️</div><div class="lbl">จังหวัดที่ครอบคลุม</div><div class="val">${provList.length}</div><div class="sub">${provList[0]?.nm || '-'} ขายดีสุด</div></div>
    </section>

    <section class="grid-2">
      <div class="card">
        <h3>📈 ยอดขายรายวัน (30 วันล่าสุด)</h3>
        <div class="desc">รวมมูลค่าออเดอร์ต่อวัน (บาท)</div>
        <canvas id="chDaily" height="120"></canvas>
      </div>
      <div class="card">
        <h3>🏆 จังหวัดขายดีที่สุด</h3>
        <div class="desc">เรียงตามมูลค่ายอดขาย</div>
        <div class="prov-list">
          ${provList.length === 0 ? '<div class="empty">ยังไม่มีข้อมูล</div>' :
            provList.map((p,i)=> `
            <div class="prov-row ${i===0?'top1':i===1?'top2':i===2?'top3':''}">
              <div class="rank">${i+1}</div>
              <div><div class="nm">${escapeHtml(p.nm)}</div><div class="sb">${p.count} ออเดอร์</div></div>
              <div class="amt">฿${THAI_BAHT.format(p.total)}</div>
              <div class="bar"><i style="width:${Math.round(p.total/maxProvTotal*100)}%"></i></div>
            </div>`).join('')}
        </div>
      </div>
    </section>

    <section class="grid-3">
      <div class="card">
        <h3>🥇 สินค้าขายดี Top 8</h3>
        <div class="desc">เรียงตามมูลค่ายอดขาย</div>
        <canvas id="chProducts" height="180"></canvas>
      </div>
      <div class="card">
        <h3>📂 ยอดขายตามหมวดหมู่</h3>
        <div class="desc">สัดส่วนรายได้ของแต่ละหมวด</div>
        <canvas id="chCats" height="180"></canvas>
      </div>
      <div class="card">
        <h3>👋 ลูกค้าใหม่ (14 วัน)</h3>
        <div class="desc">จำนวนลูกค้าใหม่ต่อวัน</div>
        <canvas id="chNew" height="180"></canvas>
      </div>
    </section>

    <section class="card" style="margin-top:18px;">
      <h3>🕐 ออเดอร์ล่าสุด</h3>
      <div class="desc">8 รายการล่าสุด</div>
      ${recent.length === 0 ? '<div class="empty">ยังไม่มีออเดอร์</div>' :
        recent.map(o => `
        <div class="ord-row">
          <div>
            <div class="nm">${escapeHtml(o.customerName || '-')} <span class="pill ${o.status==='closed'?'closed':''}">${o.status==='closed'?'ปิดดีลแล้ว':'รอปิดดีล'}</span></div>
            <div class="meta">${escapeHtml(o.address?.province||'-')} · ${(o.items||[]).length} รายการ · ${new Date(o.ts).toLocaleString('th-TH')}</div>
          </div>
          <div class="amt">฿${THAI_BAHT.format(o.totalAmount||0)}</div>
        </div>`).join('')}
    </section>
  `;

  // Charts
  const textColor = '#cbd5e1', gridColor = 'rgba(255,255,255,.08)';
  Chart.defaults.color = textColor;
  Chart.defaults.font.family = "'Prompt', sans-serif";

  new Chart(document.getElementById('chDaily'), {
    type: 'line',
    data: { labels: dayLabels, datasets: [{
      label: 'ยอดขาย (บาท)',
      data: dayValues,
      borderColor: '#14b8a6', backgroundColor: 'rgba(20,184,166,.18)',
      borderWidth: 2, fill: true, tension: .35, pointRadius: 3, pointBackgroundColor:'#5eead4'
    }] },
    options: { responsive: true, plugins: { legend: { display: false } },
      scales: { x: { grid: { color: gridColor } }, y: { grid: { color: gridColor }, beginAtZero: true } } }
  });

  new Chart(document.getElementById('chProducts'), {
    type: 'bar',
    data: { labels: productList.map(p=>p.nm),
      datasets: [{ label:'฿', data: productList.map(p=>p.total),
        backgroundColor: 'rgba(14,165,233,.7)', borderRadius: 6, borderColor:'#0ea5e9', borderWidth:1 }]},
    options: { indexAxis: 'y', plugins: { legend: { display: false } },
      scales: { x: { grid: { color: gridColor }, beginAtZero: true }, y: { grid: { display:false } } } }
  });

  new Chart(document.getElementById('chCats'), {
    type: 'doughnut',
    data: { labels: catList.map(c=>c[0]),
      datasets: [{ data: catList.map(c=>c[1]),
        backgroundColor: ['#14b8a6','#0ea5e9','#a78bfa','#f472b6','#fbbf24','#34d399','#fb7185'],
        borderColor: '#0b1220', borderWidth: 2 }] },
    options: { plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, padding: 8 } } } }
  });

  new Chart(document.getElementById('chNew'), {
    type: 'bar',
    data: { labels: newDays.map(d=>d.slice(5)),
      datasets: [{ label:'ลูกค้าใหม่', data: newDays.map(d=>newPerDay[d]),
        backgroundColor: 'rgba(244,114,182,.7)', borderRadius: 6 }] },
    options: { plugins: { legend: { display: false } },
      scales: { x: { grid: { display: false } }, y: { grid: { color: gridColor }, beginAtZero: true, ticks: { precision: 0 } } } }
  });
}

function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

loadData();
</script>
